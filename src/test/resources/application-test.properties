spring.application.name=orbit

# Database Configuration for Tests
# Use H2 in-memory database for CI/CD environments where Docker is not available
spring.datasource.url=jdbc:h2:mem:finance;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Docker Compose in tests to avoid connection errors in CI
spring.docker.compose.enabled=false
